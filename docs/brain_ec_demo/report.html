<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">

    <title>Gene Program Annotations — Program Explorer</title>

    <style>
        :root {
            --bg: #f6f7f8;
            --surface: #ffffff;
            --surface-soft: #f3f5f5;
            --surface-sunk: #eef1f1;
            --text: #14201d;
            --text-soft: #43504c;
            --muted: #6b7672;
            --border: #e4e7e6;
            --border-strong: #d2d7d5;
            --shadow-soft: 0 1px 2px rgba(16,32,28,.05);
            --accent: #0d9488;
            --accent-strong: #0f766e;
            --accent-soft: #e6f6f3;
            --accent-text: #0b6b61;
            --up: #b8615a;
            --up-soft: #f4ebe9;
            --down: #3d7d9e;
            --down-soft: #e8eff2;
            /* Evidence status palette (spec 10): supported / partial /
               contradictory / missing (grey). */
            --ok: #15803d;
            --ok-soft: #e7f6ec;
            --warn: #b45309;
            --warn-soft: #fbf1e3;
            --bad: #b91c1c;
            --bad-soft: #fbeaea;
            --gap: #6b7672;
            --gap-soft: #eef1f1;
            --radius: 12px;
            --radius-sm: 8px;
            --maxw: 1180px;
        }
        html[data-theme="dark"] {
            --bg: #0c0f0e;
            --surface: #141917;
            --surface-soft: #1a201e;
            --surface-sunk: #0f1413;
            --text: #e8ecea;
            --text-soft: #b7c0bc;
            --muted: #8a938f;
            --border: #262d2a;
            --border-strong: #333b37;
            --shadow-soft: none;
            --accent-soft: #0e2a27;
            --accent-text: #5eead4;
            --up: #d98e86;
            --up-soft: #271815;
            --down: #7fb0c9;
            --down-soft: #13222a;
            --ok: #4ade80;
            --ok-soft: #10281a;
            --warn: #fbbf24;
            --warn-soft: #2a2110;
            --bad: #f87171;
            --bad-soft: #2a1414;
            --gap: #8a938f;
            --gap-soft: #1a201e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6; font-size: 15px;
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--accent-text); }

        .topbar {
            position: sticky; top: 0; z-index: 60;
            display: flex; align-items: center; gap: 14px; padding: 10px 20px;
            background: color-mix(in srgb, var(--surface) 88%, transparent);
            backdrop-filter: saturate(1.4) blur(8px); border-bottom: 1px solid var(--border);
        }
        .brand { display: flex; align-items: baseline; gap: 8px; font-weight: 700; letter-spacing: -.01em; }
        .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); display: inline-block; }
        .brand .sub { font-weight: 500; font-size: 12px; color: var(--muted); }
        .topbar .spacer { flex: 1; }
        .search-input {
            font: inherit; font-size: 12.5px; padding: 6px 11px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--surface); color: var(--text);
            width: min(260px, 38vw);
        }
        .search-input:focus { outline: none; border-color: var(--accent); }
        .metacount { font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
        .iconbtn { font: inherit; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; }
        .iconbtn:hover { border-color: var(--border-strong); }

        .shell { display: grid; grid-template-columns: 250px minmax(0, 1fr); }
        .rail { position: sticky; top: 53px; align-self: start; height: calc(100vh - 53px); overflow-y: auto;
            border-right: 1px solid var(--border); padding: 18px 12px 32px 18px; background: var(--bg); }
        .rail h2 { font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 4px 6px 10px; }
        .rail a { display: block; padding: 7px 10px; border-radius: 8px; text-decoration: none; color: var(--text-soft);
            font-size: 12.5px; margin-bottom: 2px; line-height: 1.35; cursor: pointer; }
        .rail a .num { color: var(--muted); font-variant-numeric: tabular-nums; margin-right: 8px; font-weight: 700; }
        .rail a:hover { background: var(--surface-soft); color: var(--text); }
        .rail a.active { background: var(--accent-soft); color: var(--accent-text); font-weight: 650; }
        .rail a.active .num { color: var(--accent-text); }

        .canvas { padding: 28px clamp(18px, 3vw, 40px) 80px; }
        .wrap { max-width: var(--maxw); margin: 0 auto; }

        .hero { margin-bottom: 22px; }
        .kicker { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 700;
            letter-spacing: .07em; text-transform: uppercase; color: var(--accent-text); margin-bottom: 12px; }
        .kicker .pid { background: var(--accent); color: #fff; padding: 2px 9px; border-radius: 999px; letter-spacing: .02em; }
        .kicker .crumb { color: var(--muted); font-weight: 600; }
        h1.title { font-size: clamp(26px, 3.3vw, 37px); line-height: 1.13; letter-spacing: -.018em; font-weight: 760;
            text-wrap: balance; margin-bottom: 14px; }
        .lead { font-size: 16.5px; line-height: 1.62; color: var(--text-soft); max-width: none; text-wrap: pretty; }
        .lead b { color: var(--text); font-weight: 680; }
        .ctx { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
        .ctx .chip { font-size: 12.5px; font-weight: 600; padding: 5px 11px; border-radius: 999px;
            background: var(--accent-soft); color: var(--accent-text); }

        .glance { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border);
            border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin: 24px 0 30px; box-shadow: var(--shadow-soft); }
        .glance .cell { background: var(--surface); padding: 14px 16px; }
        .glance .cell .k { font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 700; margin-bottom: 7px; }
        .glance .cell .v { font-size: 15px; font-weight: 650; line-height: 1.35; }
        .glance .cell .v small { display: block; font-weight: 500; color: var(--muted); font-size: 12px; margin-top: 3px; }
        .reglist { display: flex; flex-wrap: wrap; gap: 4px 10px; }
        .reglist .rg { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px; font-weight: 700; white-space: nowrap; }
        .modlist { display: flex; flex-direction: column; gap: 3px; }
        .modlist span { font-size: 13px; font-weight: 600; color: var(--text-soft); display: flex; gap: 7px; }
        .modlist span b { color: var(--accent-text); font-weight: 800; }

        .genes { display: flex; flex-wrap: wrap; gap: 5px; }
        .gene { font-size: 11.5px; font-weight: 550; font-family: ui-monospace, "SF Mono", Menlo, monospace; letter-spacing: -.01em;
            padding: 1.5px 6px; border-radius: 5px; background: var(--surface-soft); border: 1px solid var(--border); color: var(--text-soft); }
        .gene.uniq { background: var(--accent-soft); border-color: transparent; color: var(--accent-text); font-weight: 600; }

        .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            margin-bottom: 16px; box-shadow: var(--shadow-soft); overflow: hidden; }
        .section > .head { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
            padding: 16px 20px; border: 0; background: transparent; color: inherit; font: inherit; cursor: pointer; }
        .section > .head .htitle { font-size: 16.5px; font-weight: 700; letter-spacing: -.01em; }
        .section > .head .hmeta { font-size: 12.5px; color: var(--muted); font-weight: 500; }
        .section > .head .chev { margin-left: auto; color: var(--muted); transition: transform .18s ease; }
        .section.open > .head .chev { transform: rotate(90deg); }
        .section > .body { padding: 0 20px 20px; }
        .section.collapsed > .body { display: none; }
        .kkey { font-weight: 700; }
        .kkey.rep { color: var(--up); }
        .kkey.act { color: var(--down); }

        .modules { display: grid; gap: 14px; }
        .mod { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 16px 6px; background: var(--surface); }
        .mod .mhead { display: flex; gap: 10px; align-items: baseline; margin-bottom: 8px; }
        .evbadge { margin-left: auto; flex: none; font-size: 10px; font-weight: 700; text-transform: uppercase;
                   letter-spacing: .04em; padding: 3px 8px; border-radius: 999px; cursor: help; white-space: nowrap; }
        .ev-partial { color: var(--warn); background: var(--warn-soft); border: 1px solid var(--warn); }
        .ev-unsupported { color: var(--bad); background: var(--bad-soft); border: 1px solid var(--bad); }
        .cttable { display: flex; flex-direction: column; gap: 4px; }
        .ctrow { display: flex; align-items: baseline; gap: 10px; padding: 7px 11px;
                 border-radius: var(--radius-sm); font-size: 13px; }
        .ctrow.ct-enr { background: var(--ok-soft); }
        .ctrow.ct-dep { background: var(--bad-soft); }
        .ctname { flex: 1; font-weight: 600; }
        .ctfc { flex: none; font-variant-numeric: tabular-nums; font-weight: 700; }
        .ct-enr .ctfc { color: var(--ok); }
        .ct-dep .ctfc { color: var(--bad); }
        .ctnote { margin-top: 10px; font-size: 11px; line-height: 1.5; color: var(--muted); }
        .mod .mnum { flex: none; width: 24px; height: 24px; border-radius: 7px; background: var(--accent-soft);
            color: var(--accent-text); font-size: 12px; font-weight: 800; display: grid; place-items: center; }
        .mod h3 { font-size: 15.5px; font-weight: 700; line-height: 1.3; }
        .mod .msum { color: var(--text-soft); font-size: 14px; margin: 6px 0 12px; }
        details { margin: 8px 0; }
        details > summary { cursor: pointer; list-style: none; font-size: 12.5px; font-weight: 650; color: var(--accent-text);
            display: inline-flex; align-items: center; gap: 6px; padding: 4px 0; }
        details > summary::-webkit-details-marker { display: none; }
        details > summary::before { content: "\25b8"; font-size: 10px; transition: transform .15s; }
        details[open] > summary::before { transform: rotate(90deg); }
        .disc { padding: 8px 0 4px; border-top: 1px dashed var(--border); margin-top: 6px; }
        .disc .field { margin-bottom: 12px; }
        .disc .field .flabel { font-size: 10.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
        .disc .field p { font-size: 13.5px; color: var(--text-soft); line-height: 1.6; }
        .pmidrow { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; margin-top: 10px; }
        .pmidlabel { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; flex: none; }
        .pmids { display: flex; flex-wrap: wrap; gap: 5px; }
        .pmids a { font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums; text-decoration: none;
            padding: 1.5px 7px; border-radius: 5px; background: var(--surface-soft); border: 1px solid var(--border); color: var(--accent-text); }
        .pmids a:hover { border-color: var(--accent); }
        /* DOI links: mirror the PMID styling (spec 10). */
        .doirow { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; margin-top: 6px; }
        .doi { display: flex; flex-wrap: wrap; gap: 5px; }
        .doi a { font-size: 11px; font-weight: 600; text-decoration: none; word-break: break-all;
            padding: 1.5px 7px; border-radius: 5px; background: var(--surface-soft); border: 1px solid var(--border); color: var(--accent-text); }
        .doi a:hover { border-color: var(--accent); }

        .distinctive p { font-size: 15px; color: var(--text-soft); line-height: 1.7; }
        .distinctive p i { color: var(--text); font-style: italic; }

        .reg { border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 7px; }
        .reg .rhead { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 9px 14px; }
        .reg .rgene { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 15px; font-weight: 700; }
        .reg .rgene.rep { color: var(--up); }
        .reg .rgene.act { color: var(--down); }
        .reg .role { font-size: 11.5px; font-weight: 600; }
        .reg .role.rep { color: var(--up); }
        .reg .role.act { color: var(--down); }
        .conf { font-size: 11px; font-weight: 600; padding: 1px 8px; border-radius: 999px; border: 1px solid var(--border-strong); color: var(--muted); }
        .conf.high { border-color: var(--accent); color: var(--accent-text); }
        .reg .fc { margin-left: auto; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
        .reg .fc b { color: var(--text-soft); }
        .reg .rbody { padding: 0 14px 10px; }
        .reg .rbody details { margin: 0; }
        .reg .rbody p { font-size: 13.5px; color: var(--text-soft); line-height: 1.6; margin-top: 6px; }

        .pwsort { display: flex; gap: 8px; align-items: center; font-size: 11.5px; color: var(--muted); margin: 18px 0 8px; font-weight: 600; }
        .pw { padding: 8px 0; border-bottom: 1px solid var(--border); }
        .pw:last-child { border-bottom: 0; }
        .pw .pwtop { display: flex; align-items: baseline; gap: 9px; margin-bottom: 6px; }
        .pw .src { font-size: 9.5px; font-weight: 800; letter-spacing: .04em; padding: 1px 5px; border-radius: 4px;
            background: var(--surface-sunk); color: var(--muted); text-transform: uppercase; white-space: nowrap; }
        .pw .pwname { font-size: 13.5px; font-weight: 650; }
        .pw .pwfdr { margin-left: auto; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
        .pw .track { height: 6px; border-radius: 999px; background: var(--surface-sunk); overflow: hidden; margin-bottom: 6px; }
        .pw .fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--accent-strong)); }
        .pw .members { font-size: 11px; color: var(--muted); line-height: 1.5; font-family: ui-monospace, "SF Mono", Menlo, monospace; }

        .figgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 4px; }
        .figbox { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: var(--surface); }
        .figbox .figcap { display: flex; align-items: baseline; gap: 6px; font-size: 12px; font-weight: 600; padding: 9px 12px;
            background: var(--surface-soft); border-bottom: 1px solid var(--border); color: var(--text-soft); }
        .figbox .figopen { margin-left: auto; font-size: 11px; font-weight: 500; color: var(--accent-text); }
        .figbox a { display: block; }
        .figbox img { width: 100%; height: auto; display: block; cursor: zoom-in; }
        .figbox .figmiss { padding: 36px 16px; text-align: center; color: var(--muted); font-size: 12px; }
        .volgrid { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 12px; }
        .volcard { min-width: 0; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 8px 4px; }
        .volcard .vtitle { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; padding: 6px 6px 2px; text-transform: capitalize; }
        .volcard .vtitle .dotc { font-size: 11px; font-weight: 600; color: var(--muted); margin-left: auto; }
        .volplot { width: 100%; height: 340px; min-width: 0; }
        .note { font-size: 11.5px; color: var(--muted); margin-top: 10px; }

        @media (max-width: 880px) {
            .shell { grid-template-columns: 1fr; }
            .rail { display: none; }
            .glance { grid-template-columns: 1fr; }
            .figgrid, .volgrid { grid-template-columns: 1fr; }
            .topbar { flex-wrap: wrap; }
            .search-input { width: 100%; }
        }
    </style>
</head>

n at the receptor (Ldlrad4/Skil), and cytoplasmic phosphatase gating (Ppm1h)—combined with unique genes such as Slc6a17 (a vesicular transporter for neutral amino acids whose expression peaks postnatally in cortex and hippocampus) and Bpgm (a 2,3-DPG synthase/phosphatase regulating oxygen delivery), which hint at metabolic coupling between neural activity and capillary function that is not captured by the three core modules; however, evidence for this metabolic de novo theme remains limited and would require dedicated follow-up.", "regulators": [{"gene": "Tgfbr1", "role": "activator", "fc": "−1.041", "confidence": "High", "mechanism": "Tgfbr1 encodes the ALK5 type I TGF-β receptor that, together with Tgfbr2, transduces TGF-β signals via Smad2/3 phosphorylation. As the primary signal transducer for the pathway controlled by Skil, Ldlrad4, and Ppm1h, Tgfbr1 knockdown would collapse program activity by eliminating the upstream stimulus that drives expression of target genes. Its STRING partners among program genes include Tgfbr2 (999), Smurf2 (994), Bambi (974), Eng (897), and Skil (659), indicating direct functional coupling to multiple program nodes. In postnatal brain capillary endothelial cells, endothelial-specific loss of TGF-β receptor signaling causes micro-haemorrhages, consistent with Tgfbr1 being essential for maintaining the capillary identity and barrier program captured here."}, {"gene": "Tgfbr2", "role": "activator", "fc": "−0.986", "confidence": "High", "mechanism": "Tgfbr2 encodes the constitutively active type II TGF-β receptor that recruits and transactivates Tgfbr1 upon ligand binding, placing it upstream of the entire Smad signaling cascade regulated by program genes Skil, Ldlrad4, and Ppm1h. Its knockdown phenocopies Tgfbr1 knockdown in reducing program activity, and STRING associates it with Eng (975), Smurf2 (961), Src (758), Bambi (685), Serpine1 (574), and Cdh2 (471)—partners linking TGF-β receptor activation to endothelial junction stability and cytoskeletal organization. Conditional endothelial Tgfbr2 deletion in neonatal mice directly recapitulates CNS micro-haemorrhage, making Tgfbr2 the most causally validated activator of this postnatal capillary barrier program."}, {"gene": "Notch1", "role": "repressor", "fc": "+0.347", "confidence": "Medium", "mechanism": "Notch1 signaling is canonically enriched in arterial endothelial cells and actively suppressed in capillary beds; its strong depletion from the program in arteries (large artery −3.44, arteriole −2.09) and Notch1 knockdown increasing program activity together suggest that Notch1 tonically represses the capillary TGF-β/ ECM maturation program. Mechanistically, Notch1 signaling (via Maml3, Mfng, and Adam10—STRING partners with scores ≥744) may suppress Skil, Hip1, or Map7 expression to maintain an arterial rather than capillary transcriptional state. Loss of Notch1 would therefore de-repress the capillary program, consistent with the known reciprocal relationship between Notch-driven arterial specification and TGF-β/BMP-driven capillary barrier maturation in postnatal CNS vasculature."}], "pathways": [{"source": "Process", "term": "Regulation of small GTPase mediated signal transduction", "fdr": "7.83e-06", "genes": ["Cdh2", "Itgav", "Kank1", "Pik3cg", "Fam49b", "Cgnl1", "Git2", "Src", "Psd3", "Iqsec1", "Dgki", "Ssx2ip", "Arhgef28", "Ripor2", "Mcf2l", "Bcr", "Akap13", "Auts2"]}, {"source": "Process", "term": "Negative regulation of cell motility", "fdr": "7.66e-05", "genes": ["Pdgfb", "Ppard", "Eng", "Serpine1", "Cldn5", "Kank1", "Rhob", "Ldlrad4", "Dach1", "Prkg1", "Limch1", "Sema6d", "Mmp28", "Ripor2", "Frmd5", "Ptprk", "Bcr", "Clasp1", "Ptprm"]}, {"source": "Process", "term": "Regulation of Ras protein signal transduction", "fdr": "0.00011", "genes": ["Cdh2", "Kank1", "Pik3cg", "Git2", "Src", "Psd3", "Iqsec1", "Dgki", "Ssx2ip", "Arhgef28", "Ripor2", "Mcf2l", "Bcr", "Akap13", "Auts2"]}, {"source": "Process", "term": "Negative regulation of cell migration", "fdr": "0.00015", "genes": ["Pdgfb", "Ppard", "Eng", "Serpine1", "Cldn5", "Kank1", "Rhob", "Ldlrad4", "Dach1", "Prkg1", "Limch1", "Sema6d", "Mmp28", "Ripor2", "Ptprk", "Bcr", "Clasp1", "Ptprm"]}, {"source": "Process", "term": "Regulation of actin cytoskeleton organization", "fdr": "0.00015", "genes": ["Inpp5k", "Edn1", "Add3", "Baiap2", "Swap70", "Coro2b", "Asap3", "Kank1", "Ppp1r9a", "Fam49b", "Rhob", "Cgnl1", "Pam", "Shroom2", "Limch1", "Tjp1", "Sptan1", "Cyfip2", "Akap13", "Clasp1"]}, {"source": "Process", "term": "Positive regulation of epithelial cell migration", "fdr": "0.00015", "genes": ["Pdgfb", "Cd40", "Flt4", "Ets1", "Serpine1", "Tgfbr2", "Pik3cg", "Rhob", "Src", "Iqsec1", "Akt3", "Hdac7", "Clasp1"]}, {"source": "Process", "term": "Regulation of actin filament-based process", "fdr": "0.0002", "genes": ["Inpp5k", "Edn1", "Add3", "Baiap2", "Swap70", "Coro2b", "Asap3", "Kank1", "Ppp1r9a", "Frmd6", "Fam49b", "Rhob", "Cgnl1", "Pam", "Shroom2", "Limch1", "Tjp1", "Sptan1", "Cyfip2", "Akap13", "Clasp1"]}, {"source": "KEGG", "term": "Adherens junction", "fdr": "0.00028", "genes": ["Igf1r", "Baiap2", "Lef1", "Tgfbr2", "Ptprb", "Src", "Tjp1", "Ssx2ip", "Ptprm"]}, {"source": "Process", "term": "Small GTPase mediated signal transduction", "fdr": "0.00058", "genes": ["Baiap2", "Rgl1", "Dock9", "Rhob", "Elmo1", "Rapgef4", "Psd3", "Dgki", "Mcf2l", "Rab4a", "Bcr", "Rab12", "Rapgef6", "Dock6", "Cdkn1a"]}, {"source": "Process", "term": "Regulation of actin filament organization", "fdr": "0.0007", "genes": ["Inpp5k", "Add3", "Baiap2", "Swap70", "Coro2b", "Asap3", "Kank1", "Ppp1r9a", "Fam49b", "Cgnl1", "Shroom2", "Limch1", "Tjp1", "Sptan1", "Cyfip2", "Clasp1"]}, {"source": "Process", "term": "Regulation of actomyosin structure organization", "fdr": "0.00076", "genes": ["Inpp5k", "Edn1", "Coro2b", "Asap3", "Ppp1r9a", "Cgnl1", "Limch1", "Tjp1", "Akap13", "Clasp1"]}, {"source": "Process", "term": "Regulation of GTPase activity", "fdr": "0.00077", "genes": ["Cd40", "Rgl1", "Prex1", "Asap3", "Usp6nl", "Dock9", "Mtss2", "Prkg1", "Arap2", "Rapgef4", "Iqsec1", "Dgki", "Arhgap27", "Ripor2", "Tbc1d14", "Bcr", "Rapgef6", "Dock6"]}], "annotation_text": "## Program 9 annotation\n\n**Brief Summary:** Program 9 is a capillary-enriched gene expression program in postnatal mouse brain endothelial cells that integrates TGF-β/BMP pathway modulation, clathrin-mediated endocytosis and cytoskeletal remodeling, and ECM microfibril assembly to coordinate vascular barrier stabilization during CNS maturation.\n\n**Program label:** Capillary TGF-β/ECM barrier maturation\n\n---\n\n### 1. High-level overview\n\nProgram 9 is strongly enriched in capillary endothelial cells (+1.23 log2FC) and markedly depleted in arterial lineages (large artery −3.44, cycling artery −3.59, arteriole −2.09) and choroid plexus (−3.22), indicating a capillary-specific functional identity rather than a pan-endothelial program. The dominant theme is multi-node regulation of TGF-β/BMP signaling—controlled extracellularly (Adamtsl2, Htra3), at the receptor level (Ldlrad4, Skil), and in the cytoplasm (Ppm1h)—coupled to receptor internalization machinery (Hip1, Cyfip2, Map7, Dennd2c) and ECM scaffold maintenance (Adamtsl2, Htra3, Lrp8). The two strongest activating regulators are Tgfbr1 and Tgfbr2, and endothelial-specific Tgfbr2 deletion in neonatal mice causes CNS micro-haemorrhages, anchoring this program firmly in postnatal brain vascular barrier integrity.\n\n---\n\n### 2. Functional modules and mechanisms\n\n```\nModule 1: Multi-node TGF-β/BMP signal tuning in capillary endothelial maturation\n\nMultiple program genes encode regulators that collectively calibrate TGF-β/BMP signal \namplitude at distinct control nodes in brain capillary endothelial cells. Adamtsl2 \ncontrols TGF-β bioavailability extracellularly via interactions with latent TGF-β \nbinding proteins (LTBPs) and fibrillin microfibrils; Htra3 inhibits TGF-β/BMP upstream \nof the cell-surface receptor through proteolytic activity; Skil/SnoN modulates the \nALK1-vs-ALK5 receptor balance, facilitating pro-angiogenic Smad1/5 over anti-\nproliferative Smad2/3 signaling in endothelial cells; Ldlrad4/C18ORF1 (located on early \nendosome membrane, enabling R-SMAD binding) competes with SARA to prevent Smad2/3 \nrecruitment to the TGF-β type I receptor; and Ppm1h dephosphorylates pSmad1/5/8 in the \ncytoplasm, acting as a gatekeeper of BMP signaling. The program's two strongest \nperturbation activators are Tgfbr1 (log2FC=−1.041) and Tgfbr2 (log2FC=−0.986)—their \nknockdown strongly reduces program activity—and endothelial-specific Tgfbr2 deletion in \nneonatal mice causes micro-haemorrhages and disrupted CNS vascular integrity during \npostnatal development, confirming the physiological centrality of this axis. Repression \nby Notch1 knockdown (log2FC=+0.347) and Nrp1 knockdown (log2FC=+0.210) indicates \ncross-talk with Notch and VEGF co-receptor pathways that antagonize or balance TGF-β \noutput in capillaries.\n\nKey genes: Skil, Ldlrad4, Htra3, Adamtsl2, Ppm1h, Tgfbr1 (regulator), Tgfbr2 (regulator)\nSupporting PMIDs: 24019535, 24627487, 15206957, 36368447, 24732009, 22745736, 32015502, 26120030\nEvidence used: Top-loading program genes Skil, Ldlrad4, Htra3, Adamtsl2, Ppm1h; \nTgfbr1 and Tgfbr2 activator perturbation with STRING links to Skil, Eng, Smurf2, \nBambi, Serpine1; Notch1 and Nrp1 repressor perturbations; NCBI gene summaries for \nLdlrad4 (R-SMAD binding, early endosome membrane), Skil (SMAD pathway, TGF-β \nrepressor complex), Adamtsl2 (LTBP interaction, ECM), Htra3 (serine-type endopeptidase, \nextracellular); capillary enrichment (+1.23) and arterial depletion; postnatal \nCNS vascular integrity evidence from literature.\n```\n\n```\nModule 2: Clathrin-mediated endocytosis and WAVE/kinesin-1 cytoskeletal remodeling\n\nSeveral program genes encode components of the endocytic machinery and cytoskeletal \nremodeling complexes that together control surface receptor availability and intracellular \ncargo transport in brain capillary endothelial cells. Hip1 is a clathrin coat adaptor \nthat mediates receptor-mediated endocytosis and regulates EGFR and transferrin receptor \ntrafficking. Cyfip2 is a core subunit of the pentameric WAVE regulatory complex (WRC) \nthat activates Arp2/3-driven actin polymerization; its phosphorylation controls WRC \nassembly and endocytic dynamics. Map7 activates kinesin-1 by tethering it to microtubules \nand regulating its landing rate and processivity, enabling vesicular cargo transport \nalong the microtubule cytoskeleton. Dennd2c is a DENN-domain Rab guanine-nucleotide \nexchange factor involved in vesicle trafficking. In brain capillary endothelial cells, \nthese processes plausibly regulate surface levels of VEGF receptors and other signaling \nreceptors; consistent with this, Nrp1 knockdown (a VEGF co-receptor) increases program \nactivity (log2FC=+0.210), suggesting that impaired receptor internalization and Nrp1-\nmediated VEGF sequestration are functionally linked. GO enrichment for regulation of \nactin cytoskeleton organization and regulation of small GTPase-mediated signal \ntransduction further supports this module, with Asap3 (an Arf-GAP promoting cell \nmigration and cytoskeletal organization) among the unique program genes.\n\nKey genes: Hip1, Cyfip2, Map7, Dennd2c, Asap3\nSupporting PMIDs: 11532990, 12781365, 28692454, 35050657, 30770434, 23315162, 36109176\nEvidence used: Top-loading program genes Hip1, Cyfip2, Map7, Dennd2c; unique gene \nAsap3; NCBI gene summaries for Hip1 (clathrin-mediated endocytosis, membrane-associated \nprotein), Cyfip2 (SCAR/WAVE complex, small GTPase binding, actin), Map7 (microtubule-\nassociated, kinesin activation, stabilization), Dennd2c (guanyl-nucleotide exchange \nfactor activity), Asap3 (Arf GAP, cell migration, cytoskeletal); Nrp1 repressor \nperturbation (STRING links: Flt4, Pdgfb, Fn1, Tgfbr2, Src); GO enrichment terms: \nregulation of actin cytoskeleton organization (Asap3, Kank1, Baiap2, Coro2b, Swap70), \nregulation of small GTPase mediated signal transduction, regulation of actin filament-\nbased process; capillary cell-type enrichment context.\n```\n\n```\nModule 3: ECM microfibril scaffold and ApoER2-mediated endothelial barrier stabilization\n\nA subset of program genes maintains the extracellular and receptor-mediated scaffold \nsupporting brain capillary barrier integrity. Adamtsl2 is a secreted glycoprotein that \ninteracts with fibrillin-1/2 and LTBPs to regulate microfibril assembly; ADAMTSL2 loss-\nof-function causes geleophysic dysplasia with fibrillin accumulation, underscoring its \nrole as a non-proteolytic organizer of the ECM. Htra3 degrades TGF-β and ECM \nproteoglycans, maintaining stromal/perivascular quiescence; its loss activates TGF-β \nand promotes fibrotic ECM remodeling that disrupts vascular architecture. Lrp8/ApoER2 \nis a low-density lipoprotein receptor family member expressed at the endothelial surface \nthat mediates activated protein C (APC)-induced Akt phosphorylation and endothelial \nbarrier stabilization; reelin/ApoER2 signaling in brain vascular endothelial cells \nfurther regulates cerebrovascular function and blood flow. Together, these genes link \nextracellular microfibril architecture with receptor-level vascular barrier integrity \nsignaling, a function particularly important during the postnatal window of CNS \nvascular maturation when the blood-brain barrier is consolidating.\n\nKey genes: Adamtsl2, Htra3, Lrp8\nSupporting PMIDs: 21858451, 25762570, 35672400, 26800564, 39892386\nEvidence used: Top-loading program genes Adamtsl2, Lrp8, Htra3; NCBI gene summaries \nfor Adamtsl2 (LTBP-1 interaction, microfibril binding, geleophysic dysplasia), Lrp8 \n(LDLR family, reelin signaling, neuronal migration, ApoE receptor), Htra3 (extracellular \nserine-type endopeptidase); GO enrichment for negative regulation of cell motility and \nnegative regulation of cell migration (Ldlrad4, Eng, Serpine1, Cldn5, Kank1); \ncapillary enrichment and arterial/choroid-plexus depletion supporting a BBB-\nstabilization context; Tgfbr1/Tgfbr2 perturbation evidence linking ECM TGF-β \nbioavailability to vascular integrity in postnatal CNS.\n```\n\n---\n\n### 3. Distinctive features\n\nThe most distinctive feature of Program 9 is the convergent multi-node architecture of TGF-β/BMP signal control—spanning extracellular protease inhibition (Htra3), matrix sequestration (Adamtsl2), Smad competitive inhibition at the receptor (Ldlrad4/Skil), and cytoplasmic phosphatase gating (Ppm1h)—combined with unique genes such as Slc6a17 (a vesicular transporter for neutral amino acids whose expression peaks postnatally in cortex and hippocampus) and Bpgm (a 2,3-DPG synthase/phosphatase regulating oxygen delivery), which hint at metabolic coupling between neural activity and capillary function that is not captured by the three core modules; however, evidence for this metabolic de novo theme remains limited and would require dedicated follow-up.\n\n---\n\n### 4. Regulator analysis\n\n```\nTgfbr1 (activator, log2FC=−1.041): [Confidence: High]\nMechanistic hypothesis: Tgfbr1 encodes the ALK5 type I TGF-β receptor that, together \nwith Tgfbr2, transduces TGF-β signals via Smad2/3 phosphorylation. As the primary \nsignal transducer for the pathway controlled by Skil, Ldlrad4, and Ppm1h, Tgfbr1 \nknockdown would collapse program activity by eliminating the upstream stimulus that \ndrives expression of target genes. Its STRING partners among program genes include \nTgfbr2 (999), Smurf2 (994), Bambi (974), Eng (897), and Skil (659), indicating \ndirect functional coupling to multiple program nodes. In postnatal brain capillary \nendothelial cells, endothelial-specific loss of TGF-β receptor signaling causes \nmicro-haemorrhages, consistent with Tgfbr1 being essential for maintaining the \ncapillary identity and barrier program captured here.\n```\n\n```\nTgfbr2 (activator, log2FC=−0.986): [Confidence: High]\nMechanistic hypothesis: Tgfbr2 encodes the constitutively active type II TGF-β \nreceptor that recruits and transactivates Tgfbr1 upon ligand binding, placing it \nupstream of the entire Smad signaling cascade regulated by program genes Skil, \nLdlrad4, and Ppm1h. Its knockdown phenocopies Tgfbr1 knockdown in reducing program \nactivity, and STRING associates it with Eng (975), Smurf2 (961), Src (758), Bambi \n(685), Serpine1 (574), and Cdh2 (471)—partners linking TGF-β receptor activation \nto endothelial junction stability and cytoskeletal organization. Conditional endothelial \nTgfbr2 deletion in neonatal mice directly recapitulates CNS micro-haemorrhage, making \nTgfbr2 the most causally validated activator of this postnatal capillary barrier program.\n```\n\n```\nNotch1 (repressor, log2FC=+0.347): [Confidence: Medium]\nMechanistic hypothesis: Notch1 signaling is canonically enriched in arterial endothelial \ncells and actively suppressed in capillary beds; its strong depletion from the program \nin arteries (large artery −3.44, arteriole −2.09) and Notch1 knockdown increasing \nprogram activity together suggest that Notch1 tonically represses the capillary TGF-β/\nECM maturation program. Mechanistically, Notch1 signaling (via Maml3, Mfng, and \nAdam10—STRING partners with scores ≥744) may suppress Skil, Hip1, or Map7 expression \nto maintain an arterial rather than capillary transcriptional state. Loss of Notch1 \nwould therefore de-repress the capillary program, consistent with the known reciprocal \nrelationship between Notch-driven arterial specification and TGF-β/BMP-driven capillary \nbarrier maturation in postnatal CNS vasculature.\n```", "kegg_fig": "string_enrichment/figures/program_9_kegg_enrichment.png", "process_fig": "string_enrichment/figures/program_9_process_enrichment.png", "volcano": [{"g": "Tgfbr1", "fc": -1.041, "p": 95.72, "s": true}, {"g": "Tgfbr2", "fc": -0.986, "p": 47.45, "s": true}, {"g": "Notch1", pressed venous markers, and Sncg, a synuclein family member, further distinguishes this venous subpopulation. Consistent with venous identity, knockdown of Notch1 (log2FC=+0.807) and Flt1 (log2FC=+0.889) both increase program activity, indicating these arterial/capillary regulators actively suppress the venous state; conversely, Nrp1 knockdown reduces program activity (-0.557), linking Nrp1 to maintenance of non-venous arterial identity. Perturbation of P48 leads to increased expression of arterial markers Notch1, Flt1, and Plxnd1, and decreased Nrp1, confirming a venous-to-arterial shift when the program is lost.", "key_genes": ["Madcam1", "Rgs9", "Olfml2b", "Sncg", "Cd82", "Mcam"], "pmids": ["36460642", "19144989", "36941369", "38600061", "36198871", "37210315"], "dois": [], "evidence": "Madcam1 (top-loading program gene; NCBI summary confirms endothelial cell adhesion molecule interacting with leukocyte integrins, consistent with venous addressin function), Rgs9 and Olfml2b (program genes with venous co-expression literature support), Sncg (program gene; synuclein family member enriched in venous subpopulation), Notch1 repressor perturbation (log2FC=+0.807), Flt1 repressor perturbation (log2FC=+0.889), Plxnd1 repressor perturbation (log2FC=+0.603), Nrp1 activator perturbation (log2FC=-0.557), arteriovenous zonation brain endothelial cell context, postnatal development context.", "mechanism": "", "status": "supported"}, {"title": "Module 2: TGF-β–driven extracellular matrix remodelling for BBB maturation", "summary": "Program 48 promotes TGF-β signalling in brain endothelium, as demonstrated by the strong reduction in program activity upon Tgfbr2 (log2FC=-0.960) and Tgfbr1 (log2FC=-0.480) knockdown—the two highest-confidence activators. TGF-β pathway activity in brain endothelial cells is required for induction of key BBB properties including tight junctions, low transcytosis, and barrier-specific transporter expression. Program gene Smoc2 is a SPARC-related matricellular protein that promotes matrix assembly and stimulates endothelial cell proliferation and angiogenic activity; Antxr2 (CMG2) binds collagen IV and laminin, anchoring cells within the perivascular ECM context in which TGF-β signalling operates. Cyba (p22phox, NADPH oxidase subunit) generates ROS that can modulate TGF-β/Smad signalling and is also linked to mechanosensing downstream of shear stress. The strong GO enrichment for extracellular matrix organization (FDR=7.31e-07; including Smoc2, Col4a1, Col4a2, Tgfb1, Lamb1) and wound healing/response to wounding (FDR=7.31e-07; including Tgfb1, Cd34, Mcam) further anchors this module in active ECM remodelling during postnatal BBB establishment.", "key_genes": ["Smoc2", "Antxr2", "Cyba", "Apod", "Olfml2b", "C1qtnf6"], "pmids": ["38748577", "29629621", "41601407", "19901963", "28604699"], "dois": [], "evidence": "Tgfbr2 activator perturbation (log2FC=-0.960, STRING partners include Tgfb1 at 999), Tgfbr1 activator perturbation (log2FC=-0.480, STRING partners include Tgfb1 at 999 and Fkbp1a at 983), Smoc2 NCBI gene summary (SPARC family matricellular protein, promotes matrix assembly and angiogenesis), Antxr2 NCBI gene summary (collagen IV and laminin binding, extracellular matrix adhesion), Cyba NCBI gene summary (NADPH oxidase subunit, superoxide generation), Apod NCBI gene summary (lipocalin family, lipid transport associated with lipoprotein metabolism), C1qtnf6 NCBI summary (predicted extracellular collagen trimer), GO extracellular matrix organization (FDR=7.31e-07), GO wound healing/response to wounding (FDR=7.60e-07), blood-brain barrier maturation postnatal development context.", "mechanism": "", "status": "supported"}, {"title": "Module 3: Semaphorin–CRMP1 axon guidance signalling co-opted in angiogenic", "summary": "tip-like endothelium A de novo module is supported by the co-occurrence of Crmp1 and the regulatory context of Nrp1 and Plxnd1. Crmp1 encodes a cytosolic phosphoprotein that is a component of th TGF-β–mediated extracellular matrix remodelling that supports blood-brain barrier maturation.\n\n**Program label:** Venous brain endothelium with BBB maturation\n\n---\n\n### 1. High-level overview\n\nProgram 48 captures a venous or post-capillary endothelial transcriptional state in the developing postnatal brain. Its most distinctive feature is strong expression of *Madcam1*, a canonical venous vascular addressin whose transcription is activated by the venous nuclear receptor COUP-TFII and directly repressed by Notch effectors in arterial/capillary endothelium. The program is further defined by TGF-β pathway activity—evidenced by strong Tgfbr1/Tgfbr2 activator perturbation effects and ECM-related genes *Smoc2*, *Antxr2*, and *Olfml2b*—which drives BBB maturation. The strong tip-like angiogenic cell enrichment (+4.65 log2FC) and wound healing/ECM GO terms point to an active remodelling context during postnatal vascular development.\n\n---\n\n### 2. Functional modules and mechanisms\n\n```\nModule 1: Venous / post-capillary endothelial identity and arteriovenous zonation\n\nProgram 48 defines a venous or post-capillary endothelial state in postnatal brain \nvasculature. Madcam1, the top-loading program gene, is a canonical venous vascular \naddressin whose transcription is activated by the venous nuclear receptor COUP-TFII \nand directly repressed by Notch effectors in arterial/capillary endothelium. Rgs9 \nand Olfml2b are co-expressed venous markers, and Sncg, a synuclein family member, \nfurther distinguishes this venous subpopulation. Consistent with venous identity, \nknockdown of Notch1 (log2FC=+0.807) and Flt1 (log2FC=+0.889) both increase program \nactivity, indicating these arterial/capillary regulators actively suppress the venous \nstate; conversely, Nrp1 knockdown reduces program activity (-0.557), linking Nrp1 \nto maintenance of non-venous arterial identity. Perturbation of P48 leads to \nincreased expression of arterial markers Notch1, Flt1, and Plxnd1, and decreased \nNrp1, confirming a venous-to-arterial shift when the program is lost.\n\nKey genes: Madcam1, Rgs9, Olfml2b, Sncg, Cd82, Mcam\nSupporting PMIDs: 36460642, 19144989, 36941369, 38600061, 36198871, 37210315\nEvidence used: Madcam1 (top-loading program gene; NCBI summary confirms endothelial \ncell adhesion molecule interacting with leukocyte integrins, consistent with venous \naddressin function), Rgs9 and Olfml2b (program genes with venous co-expression \nliterature support), Sncg (program gene; synuclein family member enriched in venous \nsubpopulation), Notch1 repressor perturbation (log2FC=+0.807), Flt1 repressor \nperturbation (log2FC=+0.889), Plxnd1 repressor perturbation (log2FC=+0.603), Nrp1 \nactivator perturbation (log2FC=-0.557), arteriovenous zonation brain endothelial \ncell context, postnatal development context.\n```\n\n```\nModule 2: TGF-β–driven extracellular matrix remodelling for BBB maturation\n\nProgram 48 promotes TGF-β signalling in brain endothelium, as demonstrated by the \nstrong reduction in program activity upon Tgfbr2 (log2FC=-0.960) and Tgfbr1 \n(log2FC=-0.480) knockdown—the two highest-confidence activators. TGF-β pathway \nactivity in brain endothelial cells is required for induction of key BBB properties \nincluding tight junctions, low transcytosis, and barrier-specific transporter \nexpression. Program gene Smoc2 is a SPARC-related matricellular protein that \npromotes matrix assembly and stimulates endothelial cell proliferation and \nangiogenic activity; Antxr2 (CMG2) binds collagen IV and laminin, anchoring cells \nwithin the perivascular ECM context in which TGF-β signalling operates. Cyba \n(p22phox, NADPH oxidase subunit) generates ROS that can modulate TGF-β/Smad \nsignalling and is also linked to mechanosensing downstream of shear stress. The \nstrong GO enrichment for extracellular matrix organization (FDR=7.31e-07; including \nSmoc2, Col4a1, Col4a2, Tgfb1, Lamb1) and wound healing/response to wounding \n(FDR=7.31e-07; including Tgfb1, Cd34, Mcam) further anchors this module in active \nECM remodelling during postnatal BBB establishment.\n\nKey genes: Smoc2, Antxr2, Cyba, Apod, Olfml2b, C1qtnf6\nSupporting PMIDs: 38748577, 29629621, 41601407, 19901963, 28604699\nEvidence used: Tgfbr2 activator perturbation (log2FC=-0.960, STRING partners include \nTgfb1 at 999), Tgfbr1 activator perturbation (log2FC=-0.480, STRING partners include \nTgfb1 at 999 and Fkbp1a at 983), Smoc2 NCBI gene summary (SPARC family matricellular \nprotein, promotes matrix assembly and angiogenesis), Antxr2 NCBI gene summary \n(collagen IV and laminin binding, extracellular matrix adhesion), Cyba NCBI gene \nsummary (NADPH oxidase subunit, superoxide generation), Apod NCBI gene summary \n(lipocalin family, lipid transport associated with lipoprotein metabolism), \nC1qtnf6 NCBI summary (predicted extracellular collagen trimer), GO extracellular \nmatrix organization (FDR=7.31e-07), GO wound healing/response to wounding \n(FDR=7.60e-07), blood-brain barrier maturation postnatal development context.\n```\n\n```\nModule 3: Semaphorin–CRMP1 axon guidance signalling co-opted in angiogenic \ntip-like endothelium\n\nA de novo module is supported by the co-occurrence of Crmp1 and the regulatory \ncontext of Nrp1 and Plxnd1. Crmp1 encodes a cytosolic phosphoprotein that is a \ncomponent of the semaphorin signal transduction pathway implicated in semaphorin-\ninduced growth cone collapse; Nrp1 (whose knockdown reduces P48 activity, \nlog2FC=-0.557) is a shared co-receptor for both semaphorins and VEGF, and its \nSTRING partner Plxnd1 (log2FC=+0.603 when knocked down) is a canonical \nsemaphorin/flow sensor that controls vessel calibre. The strong enrichment of \nProgram 48 in tip-like angiogenic cells (+4.65 log2FC) is consistent with Nrp1–\nPlxnd1–CRMP1 semaphorin signalling guiding nascent vessel sprouting and \npathfinding during postnatal brain angiogenesis. Piezo2, a mechanosensitive cation \nchannel present in an endothelial subpopulation, and Cyba acting downstream of \nshear stress, further suggest that mechanosensory inputs converge with guidance \nsignals in this tip-like context.\n\nKey genes: Crmp1, Piezo2, Cyba\nSupporting PMIDs: 40579458, 24958852, 38328196, 37225873\nEvidence used: Crmp1 NCBI gene summary (semaphorin signal transduction, growth cone \ncollapse), Nrp1 activator perturbation (log2FC=-0.557; STRING partner Crmp1 at 703, \nPlxnd1 at 983), Plxnd1 repressor perturbation (log2FC=+0.603; semaphorin/flow \nsensor), Piezo2 NCBI gene summary (mechanically-activated cation channel, vascular \nremodelling under mechanical stress), Cyba NCBI gene summary (ROS generation \ndownstream of shear stress), tip-like angiogenic cell enrichment (log2FC=+4.65), \npostnatal brain angiogenesis context.\n```\n\n---\n\n### 3. Distinctive features\n\nThe most distinctive feature of Program 48 is the pairing of *Madcam1*—a stringently venous, COUP-TFII–activated vascular addressin not normally expressed in arterial or capillary endothelium—with *Crmp1*, a semaphorin effector canonically associated with neuronal growth cone guidance, in a population strongly enriched for tip-like angiogenic identity (+4.65 log2FC). Among the unique genes, *Prrg3* (a vitamin K-dependent transmembrane protein with a glutamate-rich extracellular domain) and *Rab15* (a GTPase involved in regulated secretory pathways and endosomal trafficking) are notable; their presence suggests specialised vesicular and coagulation-related secretory activity at the venous/angiogenic front, though functional evidence in brain endothelium is currently limited.\n\n---\n\n### 4. Regulator analysis\n\n```\nTgfbr2 (activator, log2FC=-0.960): [Confidence: High]\nMechanistic hypothesis: Tgfbr2, the type II TGF-β receptor, is the strongest \nactivator of Program 48. Its knockdown reduces program activity by nearly 1 log2FC \nunit, consistent with TGF-β signalling being required to maintain the venous/BBB \nmaturation transcriptional state. Tgfbr2 likely acts through canonical Smad2/3 \nsignalling to induce ECM-remodelling genes Smoc2 and Antxr2, while also \ntranscriptionally licensing expression of venous identity genes in cooperation \nwith COUP-TFII. STRING associations of Tgfbr2 with Tgfb1 (999), Fkbp1a (615), \nand Serpine1 (574) among program-associated genes support a broad pro-maturation \ntranscriptional output. In brain endothelium, TGF-β/Smad signalling during \npostnatal development is a well-established driver of tight junction assembly and \nsuppression of transcytosis that defines mature BBB function.\n```\n\n```\nNotch1 (repressor, log2FC=+0.807): [Confidence: High]\nMechanistic hypothesis: Notch1 knockdown increases Program 48 activity, indicating \nthat active Notch1 signalling normally suppresses the venous state captured by \nthis program. This is mechanistically coherent because Notch effectors (Hes/Hey \nfamily) directly repress Madcam1 transcription in arterial and capillary \nendothelium, and Notch1 promotes arterial identity by inducing Dll4, Ephrin-B2, \nand Flt1. STRING partners of Notch1 among program-associated genes include Tgfb1 \n(772), Cd34 (637), Pecam1 (553), and Cdh2 (633), suggesting cross-talk between \nNotch and TGF-β/adhesion pathways. The opposing relationship between Notch1 and \nProgram 48 defines the arterial–venous boundary in postnatal brain endothelium: \nhigh Notch1 = arterial/capillary identity; low Notch1 = Program 48 venous state \nwith Madcam1, Rgs9, and Olfml2b expression.\n```\n\n```\nNrp1 (activator, log2FC=-0.557): [Confidence: Medium]\nMechanistic hypothesis: Nrp1 knockdown reduces Program 48 activity, suggesting \nNrp1 is required to maintain some aspect of the program. This is initially \ncounterintuitive for a venous program, as Nrp1 is often associated with arterial \nidentity, but the key resolution may be Nrp1's role as a co-receptor for semaphorin \n3 signals that act through CRMP1 and Plxnd1. Nrp1's STRING partner Crmp1 (703) is \na direct program gene, and its partner Plxnd1 (983) is the same semaphorin receptor \nwhose knockdown increases program activity. A possible mechanism is that Nrp1 \nestablishes a permissive semaphorin signalling context that sustains tip-like \nangiogenic behaviour and CRMP1-mediated cytoskeletal organisation in the \nvenous/angiogenic population; loss of Nrp1 collapses this context and \ndownregulates the program. The medium confidence reflects the dual arterial/venous \nexpression patterns of Nrp1 and the indirect nature of this evidence chain.\n```", "kegg_fig": "string_enrichment/figures/program_48_kegg_enrichment.png", "process_fig": "string_enrichment/figures/program_48_process_enrichment.png", "volcano": [{"g": "Notch1", "fc": 0.807, "p": 7.72, "s": true}, {"g": "Tgfbr2", "fc": -0.96, "p": 5.57, "s": true}, {"g": "Tgfbr1", "fc": -0.48, "p": 5.13, "s": true}, {"g": "Flt1", "fc": 0.889, "p": 4.98, "s": true}, {"g": "Plxnd1", "fc": 0.603, "p": 3.67, "s": true}, {"g": "Nrp1", "fc": -0.557, "p": 2.98, "s": true}, {"g": "Gata2", "fc": -0.397, "p": 2.72, "s": true}, {"g": "Klf2", "fc": 0.507, "p": 2.52, "s": true}, {"g": "Kdr", "fc": -0.444, "p": 2.19, "s": true}, {"g": "Creb5", "fc": -0.267, "p": 1.95, "s": false}, {"g": "Ccm2", "fc": -0.295, "p": 1.93, "s": false}, {"g": "Itgb1", "fc": 0.441, "p": 1.91, "s": false}, {"g": "Tek", "fc": -0.351, "p": 1.82, "s": false}, {"g": "Ncoa1", "fc": -0.404, "p": 1.7, "s": false}, {"g": "Nfib", "fc": 0.404, "p": 1.62, "s": false}, {"g": "Foxj3", "fc": -0.349, "p": 1.55, "s": false}, {"g": "Rel", "fc": 0.357, "p": 1.44, "s": false}, {"g": "Pik3r3", "fc": -0.214, "p": 1.37, "s": false}, {"g": "Ccser1", "fc": -0.3, "p": 1.36, "s": false}, {"g": "Sox5", "fc": -0.282, "p": 1.36, "s": false}, {"g": "Ebf1", "fc": -0.176, "p": 1.32, "s": false}, {"g": "Itga1", "fc": 0.336, "p": 1.32, "s": false}, {"g": "Plxna2", "fc": -0.351, "p": 1.28, "s": false}, {"g": "Nr4a2", "fc": -0.176, "p": 1.22, "s": false}, {"g": "Cd47", assembly", "Arterial identity via Notch/ephrin", "NO-cGMP vasomotor signaling"], "presentation_source": "agent", "top_loading": ["Atp2a3", "Eln", "Halr1", "Fbln5", "Gucy1a1", "Lox", "F2rl1", "Fblim1", "Prr16", "Efna5", "Mgp", "Col8a1", "Htra1", "Fstl1", "Mmp2"], "unique": ["Pdlim3", "Col5a2", "Skap2", "Synpo", "Gm41724", "Sdc1", "Aggf1", "Hey2"], "celltype": "Not available", "celltype_detail": [{"cell_type": "Large-artery", "direction": "enriched", "log2_fc": 6.836}], "modules": [{"title": "Module 1: Arterial elastic ECM assembly and remodeling during postnatal cerebrovascular maturation", "summary": "Elastin (Eln), lysyl oxidase (Lox), and fibulin-5 (Fbln5) cooperate to assemble and crosslink elastic fibers — a process that peaks in cerebral arteries at postnatal days 11–14. Matrix Gla protein (Mgp) associates with elastic laminae and inhibits calcification, while type VIII collagen (Col8a1) contributes to the subendothelial basement membrane. The serine protease Htra1 remodels ECM components in brain vessel walls (loss causes cerebral small vessel disease), Mmp2 degrades basement membrane collagen and elastin at the BBB, and Fstl1 is an endothelial-secreted TGF-β modulator that controls SMAD3-driven collagen deposition. Col5a2 (a fibrillar collagen regulating type I collagen fiber assembly, mutations cause Ehlers-Danlos syndrome) and Sdc1 (a heparan sulfate proteoglycan mediating cell-matrix interactions) further reinforce ECM structural remodeling. The TGF-β pathway (Tgfbr1, Eng, Smad4 as activators) serves as the master transcriptional regulator of this arterial ECM maturation program in brain endothelial cells, consistent with GO enrichment for extracellular matrix organization (FDR=2.51e-10) and the large-artery cell-type enrichment. PMID:38353503, PMID:31615160, PMID:11716499, PMID:39086959, PMID:32078339, PMID:26599057, PMID:36504622, PMID:11062290, PMID:34445652, PMID:25871831", "key_genes": ["Eln", "Lox", "Fbln5", "Col8a1", "Mgp", "Htra1", "Mmp2", "Fstl1", "Col5a2", "Sdc1"], "pmids": ["37649891", "29725820", "41142321", "15710889", "16153447", "38353503", "31615160", "11716499", "39086959", "32078339", "26599057"], "dois": [], "evidence": "Top-loading program genes (Eln, Lox, Fbln5, Col8a1, Mgp, Htra1, Mmp2, Fstl1); unique genes Col5a2 and Sdc1; GO extracellular matrix organization enrichment (FDR=2.51e-10); Tgfbr1 knockdown STRING partners include Eln, Col8a1 (high/medium confidence); Smad4 and Eng knockdown reduce program activity; NCBI summaries for Eln (elastic fiber crosslinking in blood vessels), Lox (collagen/elastin crosslinking), Fbln5 (arterial development/remodeling), Col8a1 (basement membrane collagen), Mgp (vascular calcification inhibitor), Htra1 (serine protease regulating ECM/IGF availability), Mmp2 (ECM gelatinase), Fstl1 (follistatin-like, TGF-β modulator), Col5a2 (fibrillar collagen, Ehlers-Danlos), Sdc1 (heparan sulfate proteoglycan, cell-matrix interactions); large-artery cell-type enrichment (log2FC=+6.84); postnatal cerebrovascular maturation context.", "mechanism": "", "status": "supported"}, {"title": "Module 2: Arterial endothelial identity via Notch/Hey2, ephrin, and angiogenic signaling", "summary": "Hey2 is a bHLH transcription factor directly induced by Notch signaling that is required for embryonic and postnatal cardiovascular development and is a canonical marker of arterial endothelial identity. Efna5 (Ephrin-A5) is a classical arterial identity marker whose receptor-ligand interactions delineate arterial-venous boundaries in the developing cerebrovasculature. Aggf1 encodes an angiogenic factor promoting endothelial proliferation (mutations cause Klippel-Trenaunay vascular syndrome), and Fblim1 links cell adhesion structures to the actin cytoskeleton at endothelial junctions. Together these genes define the transcriptional arterial identity of the program's expressing cells, complementing the ECM-remodeling module and consistent with GO enrichment for blood vessel morphogenesis (FDR=4.17e-09) and the strong large-artery enrichment. Notch target Hey2 is further supported by STRING associations between Smad4-knockdown partners and Dll1/Jag1, indicating cross-talk between TGF-β and Notch pathways in arterial specification.", "key_genes": ["Hey2", "Efna5", "Aggf1", "Fblim1", "Skap2", "Synpo"], "pmids": ["36504622", "11062290", "34445652", "32078339", "25871831"], "dois": [], "evidence": "Unique program genes Hey2, Efna5, Aggf1, Fblim1, Skap2, Synpo; NCBI summaries for Hey2 (Notch-induced bHLH, cardiovascular development), Efna5 (arterial identity marker, ephrin ligand), Aggf1 (angiogenic factor, Klippel-Trenaunay), Fblim1 (cell junction/actin cytoskeleton), Skap2 (adaptor protein, actin regulation), Synpo (actin-associated); GO blood vessel morphogenesis enrichment (FDR=4.17e-09) includes Hey2, Aggf1; Smad4 knockdown STRING partners Dll1 (726) and Gata6 (768) implicating Notch-TGF-β cross-talk; large-artery cell-type enrichment (log2FC=+6.84); arteriovenous zonation context in brain endothelial cells.", "mechanism": "", "status": "supported"}, {"title": "Module 3: NO-cGMP arterial vasomotor signaling", "summary": "Gucy1a1 (sGCα1) encodes the primary NO receptor in the vascular wall; biallelic variants in its human ortholog GUCY1A3 cause moyamoya-type cerebrovascular angiopathy, directly implicating the NO–cGMP axis in brain arterial homeostasis and blood flow regulation. F2rl1 (PAR2) is a protease-activated GPCR expressed on vascular endothelial cells that modulates eNOS activity and VE-cadherin, coupling extravascular proteolytic events — including those driven by the ECM-remodeling genes in Module 1 — to endothelial NO signaling and vasodilation. Atp2a3, a SERCA Ca²⁺-ATPase expressed in endothelial/smooth muscle cells, controls intracellular calcium sequestration relevant to vasoregulatory tone. Together, these genes extend the program into arterial hemodynamic control downstream of the ECM maturation theme, specific to the cerebrovascular context.", "key_genes": ["Gucy1a1", "F2rl1", "Atp2a3"], "pmids": ["36941667", "28485540", "38635782"], "dois": [], "evidence": "Top-loading program genes Gucy1a1, F2rl1, Atp2a3; NCBI summaries for Gucy1a1 (NO-activated soluble guanylate cyclase, cGMP production), F2rl1 (protease-activated receptor, vascular smooth muscle relaxation, eNOS coupling, blood pressure regulation), Atp2a3 (SERCA Ca²⁺-ATPase, calcium sequestration in muscle/endothelial excitation); large-artery cell-type enrichment (log2FC=+6.84); brain arterial homeostasis and moyamoya cerebrovascular disease context; functional linkage between ECM proteases (Htra1, Mmp2) and PAR2 (F2rl1) activation.", "mechanism": "", "status": "supported"}], "contradictions": [], "evidence_gaps": ["Efna5 (Ephrin-A5): no PubMed papers returned for any search query combining Efna5, arteriovenous, brain, or endothelial — literature evidence for this gene's role in this program was not retrievable.", "Fblim1 (Filamin binding LIM protein): no literature search returned results for this gene in endothelial or mechanosensing context.", "Atp2a3 (SERCA3): only 1 hit found but not clearly connected to brain endothelial arterial ECM function.", "Halr1 and Prr16: long non-coding RNA and poorly characterized gene respectively; no relevant mechanistic literature identified in brain endothelial context.", "F2rl1 (PAR2) in brain endothelial cells specifically: the retrieved PAR2 papers are from non-brain vascular endothelial contexts (kidney glomerular, HUVEC), making brain-specific evidence indirect."], "distinctive": "The most distinctive feature of Program 70 is its extreme specificity for large-artery endothelial cells (log2FC = +6.84, top-10 marker), combined with a coherent multi-layer arterial program: elastic ECM biogenesis (Eln, Lox, Fbln5, Mgp) co-expressed with arterial identity transcription factors (Hey2, Efna5) and vasomotor NO signaling (Gucy1a1, F2rl1) — a combination not typical of generic angiogenesis programs. The unique gene Hey2, a Notch-downstream arterial determinant expressed alongside Efna5, provides particularly strong evidence that this is a bona fide arterial identity program rather than a pan-endothelial or reactive remodeling response; however, evidence for the precise postnatal timing of the vasomotor module (Module 3) in brain arteries specifically relies partially on inference from disease genetics rather than direct developmental time-course data.", "regulators": [{"gene": "Tgfbr1", "role": "activator", "fc": "-1.760", "confidence": "High", "mechanism": "TGFBR1 (ALK5) transduces canonical TGF-β signals through SMAD2/3, directly inducing transcription of arterial ECM genes. Its knockdown most strongly suppresses the program (log2FC=-1.760), consistent with STRING high-confidence associations to Col8a1 (580), Eln (467), and medium-confidence to Fn1 (620). TGFBR1 likely acts in brain arterial endothelial cells to drive Eln, Fbln5, Lox, and Col8a1 expression during postnatal elastic fiber assembly; Fstl1 (a program gene) feeds back to modulate SMAD3 activity in this same pathway. The TGF-β → SMAD3 → ECM gene axis is thus the dominant transcriptional mechanism controlling Program 70."}, {"gene": "Eng", "role": "activator", "fc": "-1.345", "confidence": "High", "mechanism": "Endoglin (ENG) is a TGF-β co-receptor preferentially expressed on arterial and arteriolar endothelium that modulates ALK1/ALK5 signaling balance to favor arterial ECM gene induction. Its knockdown reduces program activity (log2FC=-1.345) and its STRING partners include Itgb1 (916), Cd44 (885), Vcam1 (745), and Angpt1 (609), all relevant to endothelial adhesion and identity. Loss of ENG in endothelial cells causes brain arteriovenous malformations with defective arterial-venous differentiation, directly linking ENG to the arterial identity component (Hey2, Efna5) of this program. ENG likely cooperates with TGFBR1 to sustain the combined ECM remodeling and arterial identity transcriptional output."}, {"gene" in1", "Smad6", "Bmp4", "Gja5"]}, {"source": "Process", "term": "Urogenital system development", "fdr": "2.06e-06", "genes": ["Serpinf1", "Efnb2", "Ace", "Cd44", "Dll1", "Sdc1", "Angpt1", "Robo1", "Pcsk5", "Jag1", "Mmp2", "Ctsh", "Smad6", "Bmp4", "Ass1", "Esr1", "Sulf2", "Erbb4", "Iqgap1", "Pbx1", "Sulf1", "Kirrel3", "Id2"]}, {"source": "Process", "term": "Kidney development", "fdr": "3.13e-06", "genes": ["Serpinf1", "Efnb2", "Ace", "Cd44", "Dll1", "Sdc1", "Angpt1", "Robo1", "Pcsk5", "Jag1", "Ctsh", "Smad6", "Bmp4", "Ass1", "Sulf2", "Erbb4", "Iqgap1", "Pbx1", "Sulf1", "Kirrel3", "Id2"]}, {"source": "Process", "term": "Pulmonary valve morphogenesis", "fdr": "4.22e-06", "genes": ["Hey2", "Robo1", "Jag1", "Nos3", "Smad6", "Bmp4", "Gja5"]}, {"source": "Process", "term": "Positive regulation of peptidyl-tyrosine phosphorylation", "fdr": "6.9e-06", "genes": ["Ace", "Cd44", "Angpt1", "Ehd4", "Efna1", "Gas6", "Ptger4", "Efna5", "Plcg2", "Itgb1", "Afap1l2", "Igf2", "Erbb4", "Iqgap1", "Ptprj", "Fgfr3"]}, {"source": "Process", "term": "Blood circulation", "fdr": "8.41e-06", "genes": ["Ace", "Pon1", "Dll1", "F2rl1", "Angpt1", "Gsn", "Nos3", "Emilin1", "Gas6", "Mmp2", "Smad6", "Gata6", "Smtnl2", "F2r", "Sgcd", "Gja5", "Scn1b", "Nos1", "Ptprj", "Slc8a1", "Gucy1a1", "Camk2d", "Id2"]}, {"source": "Process", "term": "Extracellular matrix assembly", "fdr": "1.44e-05", "genes": ["Ntn4", "Fbln5", "Lox", "Emilin1", "Gas6", "Ltbp4", "Ltbp3", "Col3a1"]}, {"source": "Process", "term": "Aortic valve morphogenesis", "fdr": "1.44e-05", "genes": ["Hey2", "Robo1", "Efna1", "Nos3", "Emilin1", "Smad6", "Bmp4"]}], "annotation_text": "## Program 70 annotation\n\n**Brief Summary:** Program 70 represents a large-artery brain endothelial cell identity program centered on arterial elastic ECM assembly and remodeling during postnatal cerebrovascular maturation, orchestrated by TGF-β/Notch signaling and coupled to NO-cGMP arterial vasomotor control.\n\n**Program label:** Postnatal brain arterial ECM maturation\n\n---\n\n### 1. High-level overview\n\nProgram 70 is strongly and specifically enriched in large-artery endothelial cells (log2FC = +6.84), establishing it as a cell-type identity program rather than a broadly distributed functional program. Its dominant theme is the coordinated transcription of genes that construct and remodel the arterial elastic extracellular matrix — Eln, Lox, Fbln5, Col8a1, Mgp, Htra1, Mmp2, and Fstl1 — a process that peaks in cerebral arteries during early postnatal development. A secondary arterial identity module involves Notch/Hey2, ephrin (Efna5), and angiogenic (Aggf1) signals, while a third module links Gucy1a1 and F2rl1 to NO-cGMP arterial vasomotor regulation. The program is controlled by TGF-β pathway regulators (Tgfbr1, Eng, Smad4), whose knockdown most strongly suppresses it.\n\n---\n\n### 2. Functional modules and mechanisms\n\n```\nModule 1: Arterial elastic ECM assembly and remodeling during postnatal cerebrovascular maturation\n\nElastin (Eln), lysyl oxidase (Lox), and fibulin-5 (Fbln5) cooperate to assemble and\ncrosslink elastic fibers — a process that peaks in cerebral arteries at postnatal days 11–14.\nMatrix Gla protein (Mgp) associates with elastic laminae and inhibits calcification, while\ntype VIII collagen (Col8a1) contributes to the subendothelial basement membrane. The serine\nprotease Htra1 remodels ECM components in brain vessel walls (loss causes cerebral small vessel\ndisease), Mmp2 degrades basement membrane collagen and elastin at the BBB, and Fstl1 is an\nendothelial-secreted TGF-β modulator that controls SMAD3-driven collagen deposition. Col5a2\n(a fibrillar collagen regulating type I collagen fiber assembly, mutations cause Ehlers-Danlos\nsyndrome) and Sdc1 (a heparan sulfate proteoglycan mediating cell-matrix interactions) further\nreinforce ECM structural remodeling. The TGF-β pathway (Tgfbr1, Eng, Smad4 as activators)\nserves as the master transcriptional regulator of this arterial ECM maturation program in\nbrain endothelial cells, consistent with GO enrichment for extracellular matrix organization\n(FDR=2.51e-10) and the large-artery cell-type enrichment.\n\nKey genes: Eln, Lox, Fbln5, Col8a1, Mgp, Htra1, Mmp2, Fstl1, Col5a2, Sdc1\nSupporting PMIDs: PMID:37649891, PMID:29725820, PMID:41142321, PMID:15710889, PMID:16153447,\nPMID:38353503, PMID:31615160, PMID:11716499, PMID:39086959, PMID:32078339, PMID:26599057,\nPMID:36504622, PMID:11062290, PMID:34445652, PMID:25871831\nevidence used: Top-loading program genes (Eln, Lox, Fbln5, Col8a1, Mgp, Htra1, Mmp2, Fstl1);\nunique genes Col5a2 and Sdc1; GO extracellular matrix organization enrichment (FDR=2.51e-10);\nTgfbr1 knockdown STRING partners include Eln, Col8a1 (high/medium confidence); Smad4 and Eng\nknockdown reduce program activity; NCBI summaries for Eln (elastic fiber crosslinking in blood\nvessels), Lox (collagen/elastin crosslinking), Fbln5 (arterial development/remodeling),\nCol8a1 (basement membrane collagen), Mgp (vascular calcification inhibitor), Htra1 (serine\nprotease regulating ECM/IGF availability), Mmp2 (ECM gelatinase), Fstl1 (follistatin-like,\nTGF-β modulator), Col5a2 (fibrillar collagen, Ehlers-Danlos), Sdc1 (heparan sulfate\nproteoglycan, cell-matrix interactions); large-artery cell-type enrichment (log2FC=+6.84);\npostnatal cerebrovascular maturation context.\n```\n\n```\nModule 2: Arterial endothelial identity via Notch/Hey2, ephrin, and angiogenic signaling\n\nHey2 is a bHLH transcription factor directly induced by Notch signaling that is required for\nembryonic and postnatal cardiovascular development and is a canonical marker of arterial\nendothelial identity. Efna5 (Ephrin-A5) is a classical arterial identity marker whose\nreceptor-ligand interactions delineate arterial-venous boundaries in the developing\ncerebrovasculature. Aggf1 encodes an angiogenic factor promoting endothelial proliferation\n(mutations cause Klippel-Trenaunay vascular syndrome), and Fblim1 links cell adhesion\nstructures to the actin cytoskeleton at endothelial junctions. Together these genes define\nthe transcriptional arterial identity of the program's expressing cells, complementing the\nECM-remodeling module and consistent with GO enrichment for blood vessel morphogenesis\n(FDR=4.17e-09) and the strong large-artery enrichment. Notch target Hey2 is further\nsupported by STRING associations between Smad4-knockdown partners and Dll1/Jag1, indicating\ncross-talk between TGF-β and Notch pathways in arterial specification.\n\nKey genes: Hey2, Efna5, Aggf1, Fblim1, Skap2, Synpo\nSupporting PMIDs: None\nevidence used: Unique program genes Hey2, Efna5, Aggf1, Fblim1, Skap2, Synpo; NCBI summaries\nfor Hey2 (Notch-induced bHLH, cardiovascular development), Efna5 (arterial identity marker,\nephrin ligand), Aggf1 (angiogenic factor, Klippel-Trenaunay), Fblim1 (cell junction/actin\ncytoskeleton), Skap2 (adaptor protein, actin regulation), Synpo (actin-associated); GO blood\nvessel morphogenesis enrichment (FDR=4.17e-09) includes Hey2, Aggf1; Smad4 knockdown STRING\npartners Dll1 (726) and Gata6 (768) implicating Notch-TGF-β cross-talk; large-artery\ncell-type enrichment (log2FC=+6.84); arteriovenous zonation context in brain endothelial cells.\n```\n\n```\nModule 3: NO-cGMP arterial vasomotor signaling\n\nGucy1a1 (sGCα1) encodes the primary NO receptor in the vascular wall; biallelic variants in\nits human ortholog GUCY1A3 cause moyamoya-type cerebrovascular angiopathy, directly\nimplicating the NO–cGMP axis in brain arterial homeostasis and blood flow regulation. F2rl1\n(PAR2) is a protease-activated GPCR expressed on vascular endothelial cells that modulates\neNOS activity and VE-cadherin, coupling extravascular proteolytic events — including those\ndriven by the ECM-remodeling genes in Module 1 — to endothelial NO signaling and vasodilation.\nAtp2a3, a SERCA Ca²⁺-ATPase expressed in endothelial/smooth muscle cells, controls\nintracellular calcium sequestration relevant to vasoregulatory tone. Together, these genes\nextend the program into arterial hemodynamic control downstream of the ECM maturation theme,\nspecific to the cerebrovascular context.\n\nKey genes: Gucy1a1, F2rl1, Atp2a3\nSupporting PMIDs: PMID:36941667, PMID:28485540, PMID:38635782\nevidence used: Top-loading program genes Gucy1a1, F2rl1, Atp2a3; NCBI summaries for Gucy1a1\n(NO-activated soluble guanylate cyclase, cGMP production), F2rl1 (protease-activated receptor,\nvascular smooth muscle relaxation, eNOS coupling, blood pressure regulation), Atp2a3 (SERCA\nCa²⁺-ATPase, calcium sequestration in muscle/endothelial excitation); large-artery cell-type\nenrichment (log2FC=+6.84); brain arterial homeostasis and moyamoya cerebrovascular disease\ncontext; functional linkage between ECM proteases (Htra1, Mmp2) and PAR2 (F2rl1) activation.\n```\n\n---\n\n### 3. Distinctive features\n\nThe most distinctive feature of Program 70 is its extreme specificity for large-artery endothelial cells (log2FC = +6.84, top-10 marker), combined with a coherent multi-layer arterial program: elastic ECM biogenesis (Eln, Lox, Fbln5, Mgp) co-expressed with arterial identity transcription factors (Hey2, Efna5) and vasomotor NO signaling (Gucy1a1, F2rl1) — a combination not typical of generic angiogenesis programs. The unique gene Hey2, a Notch-downstream arterial determinant expressed alongside Efna5, provides particularly strong evidence that this is a bona fide arterial identity program rather than a pan-endothelial or reactive remodeling response; however, evidence for the precise postnatal timing of the vasomotor module (Module 3) in brain arteries specifically relies partially on inference from disease genetics rather than direct developmental time-course data.\n\n---\n\n### 4. Regulator analysis\n\n```\nTgfbr1 (activator, log2FC=-1.760): [Confidence: High]\nMechanistic hypothesis: TGFBR1 (ALK5) transduces canonical TGF-β signals through SMAD2/3,\ndirectly inducing transcription of arterial ECM genes. Its knockdown most strongly suppresses\nthe program (log2FC=-1.760), consistent with STRING high-confidence associations to Col8a1\n(580), Eln (467), and medium-confidence to Fn1 (620). TGFBR1 likely acts in brain arterial\nendothelial cells to drive Eln, Fbln5, Lox, and Col8a1 expression during postnatal elastic\nfiber assembly; Fstl1 (a program gene) feeds back to modulate SMAD3 activity in this same\npathway. The TGF-β → SMAD3 → ECM gene axis is thus the dominant transcriptional mechanism\ncontrolling Program 70.\n```\n\n```\nEng (activator, log2FC=-1.345): [Confidence: High]\nMechanistic hypothesis: Endoglin (ENG) is a TGF-β co-receptor preferentially expressed on\narterial and arteriolar endothelium that modulates ALK1/ALK5 signaling balance to favor\narterial ECM gene induction. Its knockdown reduces program activity (log2FC=-1.345) and its\nSTRING partners include Itgb1 (916), Cd44 (885), Vcam1 (745), and Angpt1 (609), all relevant\nto endothelial adhesion and identity. Loss of ENG in endothelial cells causes brain\narteriovenous malformations with defective arterial-venous differentiation, directly linking\nENG to the arterial identity component (Hey2, Efna5) of this program. ENG likely cooperates\nwith TGFBR1 to sustain the combined ECM remodeling and arterial identity transcriptional output.\n```\n\n```\nSmad4 (activator, log2FC=-1.229): [Confidence: High]\nMechanistic hypothesis: SMAD4 is the obligate co-SMAD that partners with receptor-activated\nSMADs downstream of both TGFBR1 and ENG to form transcriptional complexes at ECM and\narterial identity gene promoters. Its knockdown reduces program activity (log2FC=-1.229),\nwith STRING high-confidence associations to Smad6 (975), Bmp4 (902), Dll1 (726), and Gata6\n(768) — indicating that SMAD4 coordinates TGF-β and BMP branches, and interfaces with\nNotch (Dll1) to regulate Hey2 expression. SMAD4 loss phenocopies brain arteriovenous\nmalformations similar to ENG loss, confirming its role as a core transc
