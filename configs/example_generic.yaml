# Gene Program Interpreter — runnable demo config.
#
# Points at the dataset shipped in examples/brain_endothelial_demo: a mouse brain
# endothelial Perturb-seq screen (cNMF, k=100) targeting vascular signalling
# regulators (TGF-beta/BMP, Notch, VEGF, mechanotransduction).
#
# Nothing about brain or endothelium appears in the code — the biology lives
# entirely in the `context:` block below. To interpret your own dataset, repoint
# `inputs` and rewrite `context`.

context:                       # -> ContextProfile.from_dict
  organism: mouse
  species_taxid: 10090
  tissue: brain
  cell_type: brain endothelial cell
  conditions: [CRISPR perturbation]   # goes into the literature query — keep it searchable
  context_terms:               # normal biology of the cell type — the key research control
    - blood-brain barrier integrity
    - arteriovenous zonation
    - tight junctions and paracellular permeability
    - tip and stalk cell specification
    - angiogenesis and vascular remodelling
    - TGF-beta and BMP signalling in endothelium
    - Notch and VEGF signalling
    - shear-stress mechanotransduction
  assay: Perturb-seq
  report_dataset_crumb: Mouse brain endothelial Perturb-seq

inputs:
  gene_loading: examples/brain_endothelial_demo/FB_moi15_seq2_loading_gene_k100_top300.csv
  regulators: examples/brain_endothelial_demo/Discovery_FP_moi15_seq2_thresh10_k100_default.csv
  celltype_enrichment: null    # requires cell_type/program/log2_fc/fdr columns

output_dir: runs/brain_endothelial_example

programs: [57, 63, 65]         # three artery-specific programs; a cheap first run

settings:
  n_top_genes: 300
  top_loading: 15
  top_unique: 8
  top_enrichment: 7
  genes_per_term: 10

research:
  enabled: true
  concurrency: 4
  model: claude-sonnet-4-6
  max_turns: 30
  max_budget_usd: 1.0
  per_program_timeout: 600

annotation:
  model: claude-sonnet-4-6
  max_tokens: 8192
  batch: true

theme:
  enabled: true
  model: claude-sonnet-4-6
  min_generic_program_count: 4

presentation:
  model: claude-haiku-4-5-20251001
  deterministic_fallback: true
