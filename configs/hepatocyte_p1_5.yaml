# Gene Program Interpreter — end-to-end run for programs 1-5 (parallel).
#
# Same real mouse-hepatocyte program set as hepatocyte.yaml. Runs the 5 programs
# through the full pipeline; the research step fans out 5 isolated Agent-SDK
# sessions in parallel. Generic themes are generated by the theme step (>=3 of 5
# programs), and 6 promiscuous global regulators are masked from the annotation
# regulator evidence so program-specific regulators surface instead.

context:                       # -> ContextProfile.from_dict
  organism: mouse
  species_taxid: 10090
  tissue: liver
  cell_type: hepatocyte
  conditions: [aging, MASLD]
  context_terms:
    - metabolic zonation
    - xenobiotic and drug metabolism
    - bile acid metabolism
    - gluconeogenesis and glycogen storage
    - nitrogen and urea metabolism
    - oxidative and mitochondrial metabolism
    - membrane transport and solute carriers
    - lipid metabolism

inputs:
  gene_loading: /Volumes/IF_PHAGE/Hepatocyte/Programs0617/gene_loading_K50_0_5_top300.csv
  regulators_by_condition:
    young: /Volumes/IF_PHAGE/Hepatocyte/Programs0617/50_CRT_log_nCount_RNA_log_nFeature_RNA_log_nFeature_CRISPR_thre5_log_nCount_CRISPR_thre5_young_F.txt
    aged: /Volumes/IF_PHAGE/Hepatocyte/Programs0617/50_CRT_log_nCount_RNA_log_nFeature_RNA_log_nFeature_CRISPR_thre5_log_nCount_CRISPR_thre5_aged_F.txt
  celltype_enrichment: null

output_dir: runs/hepatocyte_p1_5

programs: [1, 2, 3, 4, 5]

settings:
  n_top_genes: 300
  top_loading: 15
  top_unique: 8
  top_enrichment: 7
  genes_per_term: 10

research:                      # executor 2 — parallel literature agents
  enabled: true
  concurrency: 5               # 5 programs -> all in parallel
  model: claude-sonnet-4-5-20250929
  max_turns: 30
  max_budget_usd: 1.0
  per_program_timeout: 600
  mcp_config: research/mcp_servers.json

annotation:                    # executor 3 — Anthropic Batch synthesis + labels
  model: claude-sonnet-4-5-20250929
  max_tokens: 8192
  batch: true
  # Promiscuous global regulators masked from the annotation regulator evidence
  # (both conditions) — they are top hits in essentially every program.
  mask_regulators: [Dgat2, Flcn, Insig1, Insr, Scap, Mlxipl]

theme:                         # executor 3 — generic-theme dictionary (M6)
  enabled: true
  model: claude-sonnet-4-5-20250929
  # 5 programs: a theme in >=3 of 5 counts as generic (majority) so the
  # "Generic themes to down-weight" section is actually populated.
  min_generic_program_count: 3

presentation:                  # executor 3 (+ 4 fallback)
  model: claude-haiku-4-5-20251001
  deterministic_fallback: true
