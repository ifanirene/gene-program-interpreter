# Gene Program Interpreter — end-to-end verification run for programs 10, 11, 12.
#
# Same real mouse-hepatocyte program set as hepatocyte.yaml, selecting programs
# 10, 11 and 12 to a dedicated output_dir. Uses the corrected gene counts
# (Top 15 loading + Top 8 unique) and the deterministic report wiring
# (unique genes, top-pathway chip, per-condition perturbation plots).

context:                       # -> ContextProfile.from_dict
  organism: mouse
  species_taxid: 10090         # NCBI taxid (STRING enrichment + NCBI gene)
  tissue: liver
  cell_type: hepatocyte
  conditions: [aging, MASLD]
  context_terms:
    - metabolic zonation
    - xenobiotic and drug metabolism
    - bile acid metabolism
    - gluconeogenesis and glycogen storage
    - nitrogen and urea metabolism
    - oxidative and mitochondrial metabolism
    - membrane transport and solute carriers
    - lipid metabolism

inputs:
  # Gene loading: columns Name,Score,RowID. RowID is the PROGRAM ID (1..50).
  gene_loading: /Volumes/IF_PHAGE/Hepatocyte/Programs0617/gene_loading_K50_0_5_top300.csv

  # Condition-keyed regulators (young + aged), tab-separated:
  # target_name,program_name,log2FC,p-value,adj_pval (program_name is the program id).
  # Feeds gene_summaries regulator_validation_by_condition -> bundle perturbation_regulators,
  # AND the report's per-condition interactive perturbation-effect plots.
  regulators_by_condition:
    young: /Volumes/IF_PHAGE/Hepatocyte/Programs0617/50_CRT_log_nCount_RNA_log_nFeature_RNA_log_nFeature_CRISPR_thre5_log_nCount_CRISPR_thre5_young_F.txt
    aged: /Volumes/IF_PHAGE/Hepatocyte/Programs0617/50_CRT_log_nCount_RNA_log_nFeature_RNA_log_nFeature_CRISPR_thre5_log_nCount_CRISPR_thre5_aged_F.txt

  celltype_enrichment: null

output_dir: runs/hepatocyte_p10_12

# Three programs for this verification run. null = all programs.
programs: [10, 11, 12]

settings:
  n_top_genes: 300
  top_loading: 15
  top_unique: 8
  top_enrichment: 7
  genes_per_term: 10

research:                      # executor 2 — parallel literature agents (subscription auth)
  enabled: true
  concurrency: 3               # 3 programs -> run all at once
  model: claude-sonnet-4-5-20250929
  max_turns: 30
  max_budget_usd: 1.0          # per-program cost cap (SDK-native)
  per_program_timeout: 600
  mcp_config: research/mcp_servers.json

annotation:                    # executor 3 — Anthropic Batch synthesis + labels (API credit)
  model: claude-sonnet-4-5-20250929
  max_tokens: 8192
  batch: true
  # Promiscuous, non-program-specific regulators masked from the annotation
  # regulator evidence (both conditions), so program-specific regulators surface.
  mask_regulators: [Dgat2, Flcn, Insig1, Insr, Scap, Mlxipl]

theme:                         # executor 3 — generic-theme down-weighting (M6)
  enabled: true
  model: claude-sonnet-4-5-20250929
  min_generic_program_count: 3

presentation:                  # executor 3 (+ 4 fallback)
  model: claude-haiku-4-5-20251001
  deterministic_fallback: true
